name: Refresh data & deploy

# 동행복권 데이터를 3시간마다 받아 Cloudflare Pages(ge-uk)로 자동 배포합니다.
# (GitHub 예약작업은 지연/누락이 잦아 주기를 짧게 잡아 신선도를 확보)
# 필요 시크릿: CLOUDFLARE_API_TOKEN(Pages:Edit + Cache Purge), CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_ZONE_ID

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-deploy
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest 스피또 data
        run: node fetch-data.js

      - name: Commit data.json if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "ge-uk-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data.json
            git commit -m "chore: 데이터 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi

      - name: Build site (정적 사전 렌더)
        run: |
          node build.js
          cp data.json favicon.svg og-image.png robots.txt sitemap.xml site.webmanifest ads.txt _headers _redirects dist/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages deploy dist --project-name=ge-uk --branch=main --commit-dirty=true

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
