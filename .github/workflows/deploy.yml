name: Update & Deploy

on:
  # 매 6시간마다 데이터 갱신 (UTC)
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest 스피또 data
        run: node fetch-data.js

      - name: Build site bundle
        run: |
          mkdir -p _site
          cp index.html data.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
