name: Refresh 스피또 data

# 동행복권 데이터를 주기적으로 수집해 data.json 을 커밋합니다.
# Cloudflare Pages가 이 저장소에 연결돼 있으면 커밋 시 자동 재배포됩니다.
# (GitHub에 올리려면 토큰에 'workflow' 스코프가 필요: gh auth refresh -h github.com -s workflow)

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다 (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch latest data
        run: node fetch-data.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "speetto-radar-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data.json
            git commit -m "chore: 데이터 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
